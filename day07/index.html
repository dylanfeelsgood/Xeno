<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天机器人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }

        h1 { font-size: 1.5rem; color: #e94560; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .user {
            background: #e94560;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .assistant {
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 5px;
        }

        #input-area {
            background: #16213e;
            padding: 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        #user-input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }

        #send-btn {
            padding: 15px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        #send-btn:hover { background: #d63850; }
        #send-btn:disabled { background: #555; cursor: not-allowed; }

        .thinking {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 AI 聊天机器人</h1>
    </header>

    <div id="chat-container">
        <div class="message assistant">你好！我是你的 AI 助手，有什么我可以帮你的吗？</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入消息..."
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 显示用户消息
            addMessage(message, "user");
            userInput.value = "";
            sendBtn.disabled = true;

            // 显示思考中
            const thinking = addMessage("思考中...", "assistant thinking");

            try {
                const response = await fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message})
                });

                const data = await response.json();

                // 替换思考中
                thinking.textContent = data.reply;
                thinking.classList.remove("thinking");
            } catch (error) {
                thinking.textContent = "出错了：" + error;
                thinking.classList.remove("thinking");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // 清空按钮（双击标题栏清空）
        document.querySelector("h1").style.cursor = "pointer";
        document.querySelector("h1").title = "双击清空对话";
        document.querySelector("h1").ondblclick = async () => {
            await fetch("http://127.0.0.1:5000/clear", {method: "POST"});
            chatContainer.innerHTML = '<div class="message assistant">对话已清空，重新开始吧！</div>';
        };
    </script>
</body>
</html>
